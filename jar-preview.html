<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0C0A14;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;margin:0;gap:48px;flex-wrap:wrap;padding:60px 40px;font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
.item{text-align:center;width:200px}
.label{color:#E8E2F4;margin-top:16px;font-size:15px;font-weight:600}
.desc{color:#9B8FC2;margin-top:6px;font-size:12px;line-height:1.5}
</style>
</head>
<body>
  <!-- Option A: Current jar (lid + body + swirl) -->
  <div class="item">
    <svg width="140" height="140" viewBox="0 0 100 100" fill="none">
      <path d="M25 18h50c2 0 3 1 3 3v6H22v-6c0-2 1-3 3-3z" fill="url(#a1)"/>
      <path d="M22 27h56v6c0 2-4 4-8 5H30c-4-1-8-3-8-5v-6z" fill="url(#a1)" opacity="0.7"/>
      <path d="M30 38h40c5 0 9 3 10 8l4 26c1 5-3 10-8 10H24c-5 0-9-5-8-10l4-26c1-5 5-8 10-8z" fill="url(#a2)"/>
      <path d="M34 48c4 8 12 14 16 18 4-4 12-10 16-18" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round" fill="none"/>
      <defs>
        <linearGradient id="a1" x1="25" y1="18" x2="75" y2="33" gradientUnits="userSpaceOnUse"><stop stop-color="#E8A838"/><stop offset="1" stop-color="#D4872C"/></linearGradient>
        <linearGradient id="a2" x1="20" y1="38" x2="80" y2="82" gradientUnits="userSpaceOnUse"><stop stop-color="rgba(232,168,56,0.2)"/><stop offset="1" stop-color="rgba(168,85,247,0.08)"/></linearGradient>
      </defs>
    </svg>
    <div class="label">A: Current</div>
    <div class="desc">Jar with amber lid, translucent body, subtle swirl</div>
  </div>

  <!-- Option B: Rounder, more friendly jar with jam filling -->
  <div class="item">
    <svg width="140" height="140" viewBox="0 0 100 100" fill="none">
      <!-- Lid -->
      <rect x="30" y="16" width="40" height="8" rx="4" fill="url(#b1)"/>
      <!-- Rim -->
      <rect x="26" y="24" width="48" height="6" rx="3" fill="url(#b1)" opacity="0.7"/>
      <!-- Body -->
      <path d="M28 30c-2 0-4 2-4 4v36c0 8 6 14 14 14h24c8 0 14-6 14-14V34c0-2-2-4-4-4H28z" fill="url(#b2)"/>
      <!-- Jam filling -->
      <path d="M28 56c0 0 8-6 22-6s22 6 22 6v14c0 8-6 14-14 14H42c-8 0-14-6-14-14V56z" fill="url(#b3)" opacity="0.6"/>
      <!-- Shine -->
      <path d="M34 38v20" stroke="rgba(255,255,255,0.08)" stroke-width="3" stroke-linecap="round"/>
      <defs>
        <linearGradient id="b1" x1="30" y1="16" x2="70" y2="30" gradientUnits="userSpaceOnUse"><stop stop-color="#E8A838"/><stop offset="1" stop-color="#D4872C"/></linearGradient>
        <linearGradient id="b2" x1="24" y1="30" x2="76" y2="84" gradientUnits="userSpaceOnUse"><stop stop-color="rgba(232,168,56,0.12)"/><stop offset="1" stop-color="rgba(168,85,247,0.06)"/></linearGradient>
        <linearGradient id="b3" x1="28" y1="50" x2="72" y2="84" gradientUnits="userSpaceOnUse"><stop stop-color="#A855F7" stop-opacity="0.3"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0.15"/></linearGradient>
      </defs>
    </svg>
    <div class="label">B: Berry Jar</div>
    <div class="desc">Rounder jar with purple berry jam filling visible inside</div>
  </div>

  <!-- Option C: Minimal jar silhouette -->
  <div class="item">
    <svg width="140" height="140" viewBox="0 0 100 100" fill="none">
      <!-- Lid -->
      <rect x="32" y="18" width="36" height="7" rx="3.5" fill="#E8A838"/>
      <!-- Rim -->
      <rect x="28" y="25" width="44" height="5" rx="2.5" fill="#D4872C" opacity="0.6"/>
      <!-- Body outline -->
      <path d="M30 30h40c3 0 5 2 6 5l3 30c1 5-3 9-7 9H28c-4 0-8-4-7-9l3-30c1-3 3-5 6-5z" stroke="url(#c1)" stroke-width="2" fill="none"/>
      <!-- Inner glow -->
      <path d="M36 42c3 6 9 11 14 15 5-4 11-9 14-15" stroke="#E8A838" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>
      <circle cx="50" cy="55" r="8" fill="url(#c2)" opacity="0.15"/>
      <defs>
        <linearGradient id="c1" x1="28" y1="30" x2="72" y2="74" gradientUnits="userSpaceOnUse"><stop stop-color="#E8A838"/><stop offset="1" stop-color="#A855F7"/></linearGradient>
        <radialGradient id="c2" cx="50" cy="55" r="8" gradientUnits="userSpaceOnUse"><stop stop-color="#E8A838"/><stop offset="1" stop-color="#A855F7"/></radialGradient>
      </defs>
    </svg>
    <div class="label">C: Outline</div>
    <div class="desc">Minimal stroke jar with amber-to-purple gradient outline</div>
  </div>

  <!-- Option D: Bold filled jar with label -->
  <div class="item">
    <svg width="140" height="140" viewBox="0 0 100 100" fill="none">
      <!-- Lid handle -->
      <rect x="40" y="12" width="20" height="5" rx="2.5" fill="#D4872C"/>
      <!-- Lid -->
      <rect x="28" y="17" width="44" height="9" rx="4" fill="url(#d1)"/>
      <!-- Body -->
      <path d="M30 26h40c4 0 7 3 8 7l3 32c1 6-4 11-9 11H28c-5 0-10-5-9-11l3-32c1-4 4-7 8-7z" fill="url(#d2)"/>
      <!-- Label band -->
      <rect x="30" y="48" width="40" height="18" rx="3" fill="rgba(232,168,56,0.15)"/>
      <!-- J on label -->
      <text x="50" y="62" text-anchor="middle" font-family="Fredoka,sans-serif" font-size="14" font-weight="700" fill="#E8A838">JAM</text>
      <!-- Shine -->
      <path d="M36 30v16" stroke="rgba(255,255,255,0.1)" stroke-width="2.5" stroke-linecap="round"/>
      <defs>
        <linearGradient id="d1" x1="28" y1="17" x2="72" y2="26" gradientUnits="userSpaceOnUse"><stop stop-color="#E8A838"/><stop offset="1" stop-color="#D4872C"/></linearGradient>
        <linearGradient id="d2" x1="24" y1="26" x2="76" y2="76" gradientUnits="userSpaceOnUse"><stop stop-color="rgba(232,168,56,0.18)"/><stop offset="0.5" stop-color="rgba(168,85,247,0.1)"/><stop offset="1" stop-color="rgba(124,58,237,0.06)"/></linearGradient>
      </defs>
    </svg>
    <div class="label">D: Labeled Jar</div>
    <div class="desc">Jar with a label band reading "JAM", handle on lid</div>
  </div>
</body>
</html>
