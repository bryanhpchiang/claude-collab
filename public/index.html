<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jam — Multiplayer Claude</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1117'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ff9a56'/%3E%3Cstop offset='100%25' stop-color='%23ff6b6b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg transform='translate(32,34)'%3E%3Crect x='-12' y='-18' width='24' height='28' rx='4' fill='none' stroke='url(%23g)' stroke-width='2.5'/%3E%3Crect x='-14' y='-20' width='28' height='8' rx='3' fill='url(%23g)' opacity='0.9'/%3E%3Ccircle cx='-4' cy='0' r='2.5' fill='%23ff9a56' opacity='0.8'/%3E%3Ccircle cx='4' cy='4' r='2' fill='%23ffcc80' opacity='0.7'/%3E%3Ccircle cx='-2' cy='6' r='1.5' fill='%23ff6b6b' opacity='0.6'/%3E%3C/g%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
    }
    #header h1 {
      font-size: 16px; font-weight: 700; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    #header h1 .logo-icon {
      width: 22px; height: 22px; flex-shrink: 0;
    }
    #header h1 .brand-jam {
      font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 18px; letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ff9a56, #ff6b6b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #users-bar { font-size: 12px; color: #8b949e; }
    .user-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #3fb950; margin-right: 4px; vertical-align: middle;
    }
    #session-bar {
      display: flex; align-items: center; gap: 4px; padding: 6px 16px;
      background: #0d1117; border-bottom: 1px solid #30363d; flex-shrink: 0; overflow-x: auto;
    }
    #session-bar::-webkit-scrollbar { height: 0; }
    .session-tab {
      padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
      white-space: nowrap; border: 1px solid #30363d; background: #161b22; color: #8b949e;
    }
    .session-tab:hover { border-color: #58a6ff; color: #e6edf3; }
    .session-tab.active { background: #21262d; border-color: #58a6ff; color: #e6edf3; }
    .session-tab .user-count {
      font-size: 10px; background: #30363d; padding: 1px 5px; border-radius: 8px; margin-left: 4px;
    }
    .session-tab .close-btn {
      display: none; margin-left: 4px; padding: 0 3px; border: none; background: none;
      color: #484f58; font-size: 14px; line-height: 1; cursor: pointer; border-radius: 3px;
    }
    .session-tab:hover .close-btn.visible { display: inline-block; }
    .session-tab .close-btn:hover { color: #f85149; background: rgba(248,81,73,0.15); }
    #new-session-btn {
      padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
      border: 1px dashed #30363d; background: transparent; color: #ff9a56; white-space: nowrap;
    }
    #new-session-btn:hover { border-color: #ff9a56; background: #161b22; }
    #terminal-container { flex: 1; min-height: 0; padding: 4px; }
    #terminal-container.interactive {
      outline: 1px solid rgba(88,166,255,0.5);
      outline-offset: -4px;
    }
    #bottom-panel {
      flex-shrink: 0; border-top: 1px solid #30363d; display: flex;
      flex-direction: column; max-height: 220px;
    }
    #bottom-panel.collapsed #chat-log,
    #bottom-panel.collapsed #key-bar { display: none; }
    #chat-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: #161b22; cursor: pointer;
      font-size: 12px; color: #8b949e; user-select: none;
    }
    #chat-toggle:hover { color: #e6edf3; }
    #chat-toggle .toggle-label { display: flex; align-items: center; gap: 6px; }
    #chat-toggle .toggle-arrow { font-size: 10px; transition: transform 0.15s; }
    #bottom-panel.collapsed #chat-toggle .toggle-arrow { transform: rotate(180deg); }
    #chat-badge {
      background: #da3633; color: white; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 8px; display: none;
    }
    #chat-log {
      flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 13px;
      min-height: 80px; max-height: 150px;
    }
    #chat-log::-webkit-scrollbar { width: 6px; }
    #chat-log::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .chat-msg { margin: 3px 0; line-height: 1.4; }
    .chat-msg .name { font-weight: 600; }
    .chat-msg .text { color: #c9d1d9; }
    .chat-msg.system { color: #8b949e; font-style: italic; font-size: 12px; }
    #input-area {
      display: flex; align-items: center; padding: 8px 12px; gap: 8px;
      background: #161b22; border-top: 1px solid #30363d;
    }
    #input-area .name-tag {
      font-size: 13px; font-weight: 600; white-space: nowrap; padding: 6px 10px;
      background: #21262d; border-radius: 6px; border: 1px solid #30363d;
      cursor: pointer; user-select: none;
    }
    #input-area .name-tag:hover { border-color: #58a6ff; }
    #name-edit-input {
      background: #0d1117; border: 1px solid #58a6ff; color: #e6edf3;
      padding: 5px 8px; border-radius: 6px; font-size: 13px; font-weight: 600;
      width: 100px; outline: none;
    }
    #msg-input {
      flex: 1; background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #58a6ff; }
    #msg-input:disabled { opacity: 0.5; }
    #send-btn {
      background: #238636; color: white; border: none; padding: 8px 20px;
      border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;
      white-space: nowrap;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
    #key-bar {
      display: flex; gap: 4px; padding: 6px 12px; background: #161b22;
      border-top: 1px solid #30363d; flex-wrap: wrap;
    }
    .key-btn {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .key-btn:hover { background: #30363d; }
    .key-btn:active { background: #484f58; }
    .key-btn.mode-btn.active {
      background: rgba(88,166,255,0.18);
      border-color: #58a6ff;
      color: #e6edf3;
    }
    #name-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #161b22; padding: 32px; border-radius: 12px;
      border: 1px solid #30363d; text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .modal-box h2 { margin-bottom: 6px; font-size: 20px; }
    .modal-box p { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
    .modal-box input {
      background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      padding: 10px 14px; border-radius: 6px; font-size: 16px; width: 220px;
      outline: none; text-align: center;
    }
    .modal-box input:focus { border-color: #58a6ff; }
    .modal-box button {
      background: #238636; color: white; border: none; padding: 10px 24px;
      border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 500; margin-left: 8px;
    }
    .modal-box button:hover { background: #2ea043; }
    #lobby-view {
      display: none; flex: 1; align-items: center; justify-content: center;
      color: #8b949e; font-size: 14px;
    }
    body.in-lobby #lobby-view { display: flex; }
    body.in-lobby #terminal-container, body.in-lobby #bottom-panel { display: none; }

    /* State sidebar */
    #state-toggle-btn {
      position: fixed; right: 0; top: 50%; transform: translateY(-50%);
      z-index: 300; background: #161b22; border: 1px solid #30363d;
      border-right: none; border-radius: 8px 0 0 8px;
      color: #ff9a56; padding: 10px 6px; cursor: pointer;
      font-size: 11px; font-weight: 600; writing-mode: vertical-rl;
      letter-spacing: 1px; transition: background 0.15s, right 0.3s;
    }
    #state-toggle-btn:hover { background: #21262d; }
    #state-toggle-btn.shifted { right: 340px; }

    #state-sidebar {
      position: fixed; top: 0; right: -340px; width: 340px; height: 100vh;
      background: #0d1117; border-left: 1px solid #30363d;
      z-index: 250; display: flex; flex-direction: column;
      transition: right 0.3s ease;
      box-shadow: -4px 0 24px rgba(0,0,0,0.3);
    }
    #state-sidebar.open { right: 0; }

    #state-sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #state-sidebar-header h2 {
      font-size: 14px; font-weight: 700; color: #ff9a56;
      display: flex; align-items: center; gap: 6px;
    }
    #state-close-btn {
      background: none; border: none; color: #8b949e; cursor: pointer;
      font-size: 18px; padding: 2px 6px; border-radius: 4px;
    }
    #state-close-btn:hover { color: #e6edf3; background: #21262d; }

    /* State summary content */
    #state-summary-content {
      flex: 1; overflow-y: auto; padding: 16px;
      font-size: 13px; color: #c9d1d9; line-height: 1.6;
    }
    #state-summary-content::-webkit-scrollbar { width: 6px; }
    #state-summary-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    #state-summary-content h2 {
      font-size: 13px; font-weight: 700; color: #ff9a56; margin: 14px 0 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    #state-summary-content h2:first-child { margin-top: 0; }
    #state-summary-content ul {
      margin: 0 0 8px 0; padding-left: 18px;
    }
    #state-summary-content li {
      margin: 3px 0; color: #c9d1d9;
    }
    #state-summary-content p {
      margin: 6px 0; color: #c9d1d9;
    }
    #state-summary-content strong { color: #e6edf3; }
    #state-summary-empty {
      color: #484f58; font-size: 13px; text-align: center; padding: 40px 16px;
    }
    #state-summary-footer {
      padding: 8px 16px; border-top: 1px solid #30363d;
      font-size: 11px; color: #484f58; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    #state-updating-indicator {
      color: #ff9a56; font-size: 11px; font-weight: 600;
      display: none; align-items: center; gap: 4px;
    }
    #state-updating-indicator.visible { display: flex; }
    @keyframes pulse-dot { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    #state-updating-indicator .dot {
      width: 4px; height: 4px; border-radius: 50%; background: #ff9a56;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    .chat-msg { position: relative; }

    /* @mention highlighting */
    .mention-highlight {
      color: #ff9a56; font-weight: 600; background: rgba(255,154,86,0.12);
      padding: 0 2px; border-radius: 3px;
    }
    .mention-highlight.mention-me {
      background: rgba(255,154,86,0.25);
    }

    /* @mention autocomplete dropdown */
    #mention-dropdown {
      position: absolute; bottom: 100%; left: 0; right: 0;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      max-height: 160px; overflow-y: auto; display: none;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.3); z-index: 50;
      margin-bottom: 4px;
    }
    #mention-dropdown .mention-option {
      padding: 8px 14px; cursor: pointer; font-size: 13px; color: #c9d1d9;
      display: flex; align-items: center; gap: 8px;
    }
    #mention-dropdown .mention-option:hover,
    #mention-dropdown .mention-option.active {
      background: #21262d; color: #ff9a56;
    }
    #mention-dropdown .mention-option .mention-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0;
    }

    /* Unread mentions banner */
    #mentions-banner {
      display: none; padding: 8px 14px; background: rgba(255,154,86,0.15);
      border-bottom: 1px solid rgba(255,154,86,0.3); font-size: 13px; color: #ff9a56;
      cursor: pointer; position: relative;
    }
    #mentions-banner:hover { background: rgba(255,154,86,0.2); }
    #mentions-banner .banner-close {
      position: absolute; right: 10px; top: 8px;
      background: none; border: none; color: #8b949e; cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px;
    }
    #mentions-banner .banner-close:hover { color: #e6edf3; background: #21262d; }
    #mentions-banner .banner-title { font-weight: 600; margin-bottom: 4px; }
    #mentions-banner .banner-msg {
      font-size: 12px; color: #c9d1d9; margin: 2px 0; padding-left: 8px;
      border-left: 2px solid rgba(255,154,86,0.4);
    }
    #mentions-banner .banner-msg .banner-from { color: #ff9a56; font-weight: 600; }

    /* Mobile responsive */
    @media (max-width: 600px) {
      #header { padding: 6px 10px; }
      #header h1 { font-size: 14px; gap: 6px; }
      #header h1 .logo-icon { width: 18px; height: 18px; }
      #header h1 .brand-jam { font-size: 15px; }
      #users-bar { font-size: 11px; max-width: 50%; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      #session-bar { padding: 4px 8px; gap: 3px; }
      .session-tab { padding: 4px 8px; font-size: 11px; }
      .session-tab .user-count { font-size: 9px; padding: 1px 4px; }
      #new-session-btn { padding: 4px 8px; font-size: 11px; }

      #terminal-container { padding: 2px; }

      #bottom-panel { max-height: 260px; }
      #chat-log { min-height: 60px; max-height: 120px; padding: 4px 8px; font-size: 12px; }

      #input-area { padding: 6px 8px; gap: 4px; flex-wrap: wrap; }
      #input-area .name-tag { font-size: 11px; padding: 5px 7px; }
      #msg-input { font-size: 16px; padding: 8px 10px; min-width: 0; flex: 1 1 0; }
      #send-btn { padding: 8px 14px; font-size: 13px; }

      #key-bar { padding: 4px 8px; gap: 3px; justify-content: center; }
      .key-btn { padding: 6px 8px; font-size: 11px; }

      /* State sidebar full-width on mobile */
      #state-sidebar { width: 100vw; right: -100vw; }
      #state-sidebar.open { right: 0; }
      #state-toggle-btn.shifted { right: 100vw; }

      /* Mention dropdown */
      #mention-dropdown { border-radius: 6px; }
      #mention-dropdown .mention-option { padding: 10px 12px; font-size: 12px; }

      /* Modal */
      .modal-box { padding: 24px 20px; margin: 0 16px; }
      .modal-box input { width: 180px; font-size: 16px; }
    }

    /* Extra small (iPhone SE etc) */
    @media (max-width: 375px) {
      #header h1 .brand-jam { font-size: 14px; }
      #users-bar { display: none; }
      .session-tab { padding: 3px 6px; font-size: 10px; }
      #input-area .name-tag { display: none; }
      .key-btn { padding: 5px 6px; font-size: 10px; }
    }
  </style>
</head>
<body class="in-lobby">
  <div id="name-modal">
    <div class="modal-box">
      <svg width="48" height="48" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:12px">
        <defs><linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9a56"/><stop offset="100%" stop-color="#ff6b6b"/></linearGradient></defs>
        <g transform="translate(32,34)">
          <rect x="-12" y="-18" width="24" height="28" rx="4" fill="none" stroke="url(#mg)" stroke-width="3"/>
          <rect x="-14" y="-20" width="28" height="8" rx="3" fill="url(#mg)" opacity="0.9"/>
          <circle cx="-4" cy="0" r="2.5" fill="#ff9a56" opacity="0.8"/><circle cx="4" cy="4" r="2" fill="#ffcc80" opacity="0.7"/><circle cx="-2" cy="6" r="1.5" fill="#ff6b6b" opacity="0.6"/>
        </g>
      </svg>
      <h2 style="font-family:'Fredoka',sans-serif;font-weight:700;letter-spacing:0.5px;background:linear-gradient(135deg,#ff9a56,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Jam</h2>
      <p>Multiplayer Claude — enter your name to join</p>
      <div>
        <input id="name-input" type="text" placeholder="your name" maxlength="20" autofocus>
        <button id="join-btn">Join</button>
      </div>
    </div>
  </div>
  <div id="header">
    <h1>
      <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff9a56"/><stop offset="100%" stop-color="#ff6b6b"/></linearGradient></defs>
        <g transform="translate(32,34)">
          <rect x="-12" y="-18" width="24" height="28" rx="4" fill="none" stroke="url(#hg)" stroke-width="3"/>
          <rect x="-14" y="-20" width="28" height="8" rx="3" fill="url(#hg)" opacity="0.9"/>
          <circle cx="-4" cy="0" r="2.5" fill="#ff9a56" opacity="0.8"/><circle cx="4" cy="4" r="2" fill="#ffcc80" opacity="0.7"/><circle cx="-2" cy="6" r="1.5" fill="#ff6b6b" opacity="0.6"/>
        </g>
      </svg>
      <span class="brand-jam">Jam</span>
    </h1>
    <div id="users-bar"></div>
  </div>
  <div id="session-bar">
    <button id="new-session-btn">+ New Session</button>
  </div>
  <div id="lobby-view">Pick a session above or start a new one</div>
  <div id="terminal-container"></div>
  <div id="bottom-panel" class="collapsed">
    <div id="chat-toggle">
      <span class="toggle-label"><span class="toggle-arrow">&#9660;</span> Chat</span>
      <span id="chat-badge">0</span>
    </div>
    <div id="key-bar">
      <button class="key-btn mode-btn" id="terminal-mode-btn" title="Capture your keyboard directly in the terminal" disabled>Direct Type: Off</button>
      <button class="key-btn" data-label="Enter">Enter</button>
      <button class="key-btn" data-label="Esc">Esc</button>
      <button class="key-btn" data-label="Tab">Tab</button>
      <button class="key-btn" data-label="Space">Space</button>
      <button class="key-btn" data-label="Up">Up</button>
      <button class="key-btn" data-label="Down">Down</button>
      <button class="key-btn" data-label="Left">Left</button>
      <button class="key-btn" data-label="Right">Right</button>
      <button class="key-btn" data-label="Ctrl+C">Ctrl+C</button>
      <button class="key-btn" data-label="Ctrl+B">Ctrl+B</button>
      <button class="key-btn" data-label="y">y</button>
      <button class="key-btn" data-label="n">n</button>
    </div>
    <div id="mentions-banner"></div>
    <div id="chat-log"></div>
    <div id="input-area" style="position:relative">
      <div class="name-tag" id="my-name-tag" style="display:none"></div>
      <input id="msg-input" type="text" placeholder="Type a message to Claude..." disabled>
      <button id="send-btn" disabled>Send</button>
      <div id="mention-dropdown"></div>
    </div>
  </div>
  <!-- State sidebar toggle -->
  <button id="state-toggle-btn">STATE</button>

  <!-- State sidebar -->
  <div id="state-sidebar">
    <div id="state-sidebar-header">
      <h2>&#9881; State of Things</h2>
      <button id="state-close-btn">&times;</button>
    </div>
    <div id="state-summary-content">
      <div id="state-summary-empty">No activity yet. Start chatting and an AI summary will appear here.</div>
    </div>
    <div id="state-summary-footer">
      <span id="state-last-updated"></span>
      <span id="state-updating-indicator"><span class="dot"></span> Updating...</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const isMobile = window.innerWidth <= 600;
    const term = new Terminal({
      cursorBlink: true, fontSize: isMobile ? 10 : 14,
      fontFamily: '"JetBrains Mono", Menlo, Monaco, "Courier New", monospace',
      theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff', selectionBackground: '#264f78' },
      disableStdin: true, scrollback: isMobile ? 2000 : 5000,
    });
    const fitAddon = new FitAddon.FitAddon();

    const COLORS = ['#ff7b72','#d2a8ff','#79c0ff','#7ee787','#ffa657','#f778ba','#a5d6ff','#ffd8b1'];
    function nameColor(n) { let h=0; for(let i=0;i<n.length;i++) h=n.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }

    // Convert hex color to ANSI truecolor escape code
    function hexToAnsi(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `\x1b[1;38;2;${r};${g};${b}m`;
    }

    // Colorize usernames in terminal output without breaking existing ANSI sequences
    function colorizeOutput(data) {
      if (!connectedUsers.length) return data;
      // Split on ANSI escape sequences — only process text parts
      const parts = data.split(/(\x1b\[[0-9;]*[a-zA-Z])/);
      for (let i = 0; i < parts.length; i++) {
        if (parts[i].startsWith('\x1b[')) continue; // skip ANSI sequences
        // Colorize [username]: pattern (message prefix)
        for (const user of connectedUsers) {
          const ansi = hexToAnsi(nameColor(user));
          const escaped = user.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          const bracketRe = new RegExp(`\\[${escaped}\\]`, 'g');
          parts[i] = parts[i].replace(bracketRe, `${ansi}[${user}]\x1b[0m`);
          // Colorize @mentions — highlight @me with inverse video so it pops
          const mentionRe = new RegExp(`@${escaped}\\b`, 'g');
          const isMe = myName && user.toLowerCase() === myName.toLowerCase();
          const mentionAnsi = isMe ? `\x1b[1;7;38;2;255;154;86m` : ansi; // inverse orange for self
          parts[i] = parts[i].replace(mentionRe, `${mentionAnsi}@${user}\x1b[0m`);
        }
      }
      return parts.join('');
    }
    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function formatSessionTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / 86400000);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const timeStr = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (diffDays === 0) {
        // Today - show relative if recent, otherwise time
        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin < 1) return 'just now';
        if (diffMin < 60) return diffMin + 'm ago';
        return 'Today, ' + timeStr;
      }
      if (diffDays === 1) return 'Yesterday, ' + timeStr;
      if (diffDays < 7) return d.toLocaleDateString([], { weekday: 'short' }) + ', ' + timeStr;
      if (d.getFullYear() === now.getFullYear()) return months[d.getMonth()] + ' ' + d.getDate() + ', ' + timeStr;
      return months[d.getMonth()] + ' ' + d.getDate() + ' ' + d.getFullYear() + ', ' + timeStr;
    }

    // Render text with @mentions highlighted
    function renderMentions(text) {
      // Escape the text first, then replace @mentions with highlighted spans
      const escaped = esc(text);
      return escaped.replace(/@(\w+)/g, (match, username) => {
        const isMe = myName && username.toLowerCase() === myName.toLowerCase();
        return `<span class="mention-highlight${isMe ? ' mention-me' : ''}">${match}</span>`;
      });
    }

    async function deleteSession(id, userCount) {
      if (sessionList.length <= 1) return;
      if (userCount > 0 && !confirm(`There ${userCount === 1 ? 'is 1 user' : 'are ' + userCount + ' users'} in this session. Close it?`)) return;
      await fetch('/api/sessions', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen = () => {
        // If loaded via /j/:id, JAM_SESSION_ID is set — auto-join that session
        if (window.JAM_SESSION_ID) {
          pendingJoin = window.JAM_SESSION_ID;
        } else {
          const urlSession = new URL(location.href).searchParams.get('s');
          if (urlSession) pendingJoin = urlSession;
        }
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case 'sessions':
            sessionList = msg.sessions; renderSessionTabs();
            if (pendingJoin) {
              if (sessionList.find(s => s.id === pendingJoin)) joinSession(pendingJoin);
              pendingJoin = null;
            }
            break;
          case 'output': term.write(colorizeOutput(msg.data)); term.scrollToBottom(); break;
          case 'chat': addChat(msg.name, msg.text); break;
          case 'system': addSystem(msg.text); break;
          case 'users':
            updateUsers(msg.users);
            if (currentSessionId) {
              const s = sessionList.find(s => s.id === currentSessionId);
              if (s) s.users = msg.users;
              renderSessionTabs();
            }
            break;
          case 'mention':
            // Someone was @mentioned — show macOS toast if it's us and tab is hidden
            if (msg.mentioned && myName && msg.mentioned.toLowerCase() === myName.toLowerCase()) {
              if (document.hidden && notificationPermission === 'granted') {
                const preview = msg.text.length > 80 ? msg.text.slice(0, 80) + '...' : msg.text;
                const notif = new Notification(`${msg.from} mentioned you in Jam`, {
                  body: preview,
                  icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#0d1117"/><text x="32" y="42" text-anchor="middle" font-size="32" fill="#ff9a56">@</text></svg>'),
                  tag: 'jam-mention-' + Date.now(),
                  requireInteraction: true, // stays until clicked/dismissed
                });
                notif.onclick = () => {
                  window.focus(); // switch to the Jam tab
                  notif.close();
                  // If mention was in a different session, switch to it
                  if (msg.sessionId && msg.sessionId !== currentSessionId) {
                    joinSession(msg.sessionId);
                  }
                };
              }
            }
            break;
          case 'unread-mentions':
            // Show banner with unread mentions from while user was away
            if (msg.mentions && msg.mentions.length > 0) {
              showMentionsBanner(msg.mentions);
            }
            break;
        }
      };
      ws.onclose = () => {
        document.getElementById('msg-input').disabled = true;
        document.getElementById('send-btn').disabled = true;
        terminalModeBtn.disabled = true;
        setInteractiveTerminalMode(false);
        addSystem('Disconnected. Reconnecting...');
        setTimeout(connect, 2000);
      };
      ws.onerror = () => ws.close();
    }
    function send({ direct = false } = {}) {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN || !currentSessionId) return;
      ws.send(JSON.stringify({ type: 'input', text, direct }));
      input.value = ''; input.focus();
    }
    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      // Don't send if mention dropdown is open and Enter is used to select
      const md = document.getElementById('mention-dropdown');
      if (md && md.style.display === 'block' && (e.key === 'Enter' || e.key === 'Tab' || e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Escape')) return;
      if (e.key === 'Enter') {
        e.preventDefault();

        const wantEsc = !direct && (e.metaKey || e.ctrlKey);
        send({ direct });

    document.getElementById('msg-input').addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items;

      for (const item of items) {

        e.preventDefault();
        const blob = item.getAsFile();
        if (!blob) continue;
        const input = document.getElementById('msg-input');
        const origPlaceholder = input.placeholder;
        input.placeholder = 'Uploading image...';
        input.style.borderColor = '#ffa657';
        try {
          const fd = new FormData();
          fd.append('image', blob);
          const res = await fetch('/api/upload-image', { method: 'POST', body: fd });
          const data = await res.json();
          if (data.path) {
            input.value = (input.value ? input.value + ' ' : '') + data.path + ' ';
            input.focus();
          } else {
            addSystem('Image upload failed: ' + (data.error || 'unknown error'));
          }
        } catch (err) {
          addSystem('Image upload failed: ' + err.message);
        } finally {

          input.style.borderColor = '';
        }
        break; // only handle first image
      }
    });

    const KEY_MAP = {

    document.getElementById('new-session-btn').addEventListener('click', async (e) => {

    // ===== @Mention Autocomplete =====

    function getMentionContext() {
      const val = msgInput.value;
      const cursor = msgInput.selectionStart;
      // Look backwards from cursor for an @ that starts a mention
      let i = cursor - 1;
      while (i >= 0 && /\w/.test(val[i])) i--;
      if (i >= 0 && val[i] === '@') {
        const query = val.slice(i + 1, cursor).toLowerCase();
        return { start: i, query, end: cursor };
      }
      return null;
    }

    function showMentionDropdown(query) {
      mentionFilteredUsers = connectedUsers.filter(u =>
        u.toLowerCase() !== myName.toLowerCase() && u.toLowerCase().startsWith(query)
      );
      // Also include users who match anywhere in name
      const rest = connectedUsers.filter(u =>
        u.toLowerCase() !== myName.toLowerCase() &&
        !u.toLowerCase().startsWith(query) &&
        u.toLowerCase().includes(query)
      );
      mentionFilteredUsers = [...mentionFilteredUsers, ...rest];
      if (mentionFilteredUsers.length === 0) {
        hideMentionDropdown();
        return;
      }
      mentionActiveIndex = 0;
      mentionDropdown.innerHTML = '';
      mentionFilteredUsers.forEach((user, idx) => {
        const opt = document.createElement('div');
        opt.className = 'mention-option' + (idx === 0 ? ' active' : '');
        opt.innerHTML = `<span class="mention-dot"></span><span style="color:${nameColor(user)}">${esc(user)}</span>`;
        opt.addEventListener('mousedown', (e) => {
          e.preventDefault();
          completeMention(user);
        });
        mentionDropdown.appendChild(opt);
      });
      mentionDropdown.style.display = 'block';
    }

    function hideMentionDropdown() {
      mentionDropdown.style.display = 'none';
      mentionDropdown.innerHTML = '';
      mentionActiveIndex = -1;
      mentionFilteredUsers = [];
      mentionStartPos = -1;
    }

    function completeMention(username) {
      const ctx = getMentionContext();
      if (!ctx) { hideMentionDropdown(); return; }
      const val = msgInput.value;
      const before = val.slice(0, ctx.start);
      const after = val.slice(ctx.end);
      msgInput.value = before + '@' + username + ' ' + after;
      const newPos = before.length + 1 + username.length + 1;
      msgInput.setSelectionRange(newPos, newPos);
      msgInput.focus();
      hideMentionDropdown();
    }

    msgInput.addEventListener('input', () => {
      const ctx = getMentionContext();
      if (ctx) {
        mentionStartPos = ctx.start;
        showMentionDropdown(ctx.query);
      } else {
        hideMentionDropdown();
      }
    });

    msgInput.addEventListener('keydown', (e) => {
      if (mentionDropdown.style.display !== 'block') return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        mentionActiveIndex = (mentionActiveIndex + 1) % mentionFilteredUsers.length;
        updateMentionActive();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        mentionActiveIndex = (mentionActiveIndex - 1 + mentionFilteredUsers.length) % mentionFilteredUsers.length;
        updateMentionActive();
      } else if (e.key === 'Tab' || e.key === 'Enter') {
        if (mentionFilteredUsers.length > 0 && mentionActiveIndex >= 0) {
          e.preventDefault();
          e.stopPropagation();
          completeMention(mentionFilteredUsers[mentionActiveIndex]);
        }
      } else if (e.key === 'Escape') {
        e.preventDefault();
        hideMentionDropdown();
      }
    });

    function updateMentionActive() {
      const options = mentionDropdown.querySelectorAll('.mention-option');
      options.forEach((opt, idx) => {
        opt.classList.toggle('active', idx === mentionActiveIndex);
      });
      // Scroll active into view
      const active = options[mentionActiveIndex];
      if (active) active.scrollIntoView({ block: 'nearest' });
    }

    msgInput.addEventListener('blur', () => {
      // Small delay so mousedown on dropdown option fires first
      setTimeout(hideMentionDropdown, 150);
    });

    // ===== State Sidebar =====
    const stateSidebar = document.getElementById('state-sidebar');
    const stateToggleBtn = document.getElementById('state-toggle-btn');

    stateToggleBtn.addEventListener('click', () => {
      const opening = !stateSidebar.classList.contains('open');
      stateSidebar.classList.toggle('open');
      stateToggleBtn.classList.toggle('shifted');
      if (opening) fetchStateSummary();
    });
    document.getElementById('state-close-btn').addEventListener('click', () => {
      stateSidebar.classList.remove('open');
      stateToggleBtn.classList.remove('shifted');
    });

    // Simple markdown to HTML converter
    function markdownToHtml(md) {
      const lines = md.split('\n');
      let html = '';
      let inList = false;
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        // Heading ##
        if (/^##\s+(.+)/.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += '<h2>' + esc(line.replace(/^##\s+/, '')) + '</h2>';
          continue;
        }
        // Bullet list item
        if (/^\s*[-*]\s+(.+)/.test(line)) {
          if (!inList) { html += '<ul>'; inList = true; }
          const content = line.replace(/^\s*[-*]\s+/, '');
          html += '<li>' + inlineMd(content) + '</li>';
          continue;
        }
        // Empty line
        if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }
        // Regular paragraph
        if (inList) { html += '</ul>'; inList = false; }
        html += '<p>' + inlineMd(line) + '</p>';
      }
      if (inList) html += '</ul>';
      return html;
    }

    function inlineMd(text) {
      // Escape HTML first, then apply bold
      let s = esc(text);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return s;
    }

    let lastStateMarkdown = '';
    let statePollTimer = null;

    function renderStateSummary(markdown, lastModified) {
      const container = document.getElementById('state-summary-content');
      const indicator = document.getElementById('state-updating-indicator');
      indicator.classList.remove('visible');
      if (!markdown || !markdown.trim()) {
        container.innerHTML = '<div id="state-summary-empty">No activity yet. Start chatting and an AI summary will appear here.</div>';
        document.getElementById('state-last-updated').textContent = '';
        return;
      }
      container.innerHTML = markdownToHtml(markdown);
      const ts = document.getElementById('state-last-updated');
      if (lastModified && lastModified > 0) {
        const d = new Date(lastModified);
        ts.textContent = 'Updated ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      } else {
        ts.textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }
    }

    async function fetchStateSummary() {
      try {
        const res = await fetch('/api/state-summary');
        const data = await res.json();
        if (data.markdown !== lastStateMarkdown) {
          lastStateMarkdown = data.markdown;
          renderStateSummary(data.markdown, data.lastModified);
        }
      } catch {}
    }

    function startStatePolling() {
      if (statePollTimer) clearInterval(statePollTimer);
      statePollTimer = setInterval(fetchStateSummary, 15000);
    }

    function stopStatePolling() {
      if (statePollTimer) { clearInterval(statePollTimer); statePollTimer = null; }
    }
  </script>
</body>
</html>
