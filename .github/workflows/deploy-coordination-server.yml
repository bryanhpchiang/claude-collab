name: Deploy Coordination Server

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - packages/coordination/**
      - packages/runtime/**
      - packages/shared/**
      - scripts/build-e2b-template.ts
      - .github/workflows/deploy-coordination-server.yml
  workflow_dispatch:

concurrency:
  group: coordination-server-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Push Coordination Server Image
    runs-on:
      - codebuild-JamCoordinationServerRunner-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 30
    env:
      AWS_REGION: us-east-1
      IMAGE_REPO_NAME: jam/coordination-server
      DEPLOY_TAG: main
      DOCKER_BUILDKIT: "1"
      E2B_DOMAIN: e2b.letsjam.now
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Resolve E2B template name
        shell: bash
        run: echo "E2B_TEMPLATE_NAME=jam-runtime-${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Install template build dependencies
        shell: bash
        run: bun install --frozen-lockfile --production --filter @jam/coordination

      - name: Build versioned E2B runtime template
        shell: bash
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          JAM_E2B_TEMPLATE: ${{ env.E2B_TEMPLATE_NAME }}
          JAM_E2B_TEMPLATE_REF: ${{ github.sha }}
          E2B_DOMAIN: ${{ env.E2B_DOMAIN }}
        run: bun run e2b:template:build

      - name: Resolve AWS account ID
        id: aws-account
        shell: bash
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account_id }}
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build deployment image
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account_id }}
        run: |
          ECR_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME"
          docker build \
            --file packages/coordination/Dockerfile \
            --build-arg "JAM_E2B_TEMPLATE=$E2B_TEMPLATE_NAME" \
            --tag "$ECR_URI:$GITHUB_SHA" \
            --tag "$ECR_URI:$DEPLOY_TAG" \
            .

      - name: Push deployment image
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ steps.aws-account.outputs.account_id }}
        run: |
          ECR_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME"
          docker push "$ECR_URI:$GITHUB_SHA"
          docker push "$ECR_URI:$DEPLOY_TAG"
