<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Collab</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
    }
    #header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    #header h1 span { color: #7ee787; }
    #users-bar { font-size: 12px; color: #8b949e; }
    .user-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #3fb950; margin-right: 4px; vertical-align: middle;
    }
    #session-bar {
      display: flex; align-items: center; gap: 4px; padding: 6px 16px;
      background: #0d1117; border-bottom: 1px solid #30363d; flex-shrink: 0; overflow-x: auto;
    }
    #session-bar::-webkit-scrollbar { height: 0; }
    .session-tab {
      padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
      white-space: nowrap; border: 1px solid #30363d; background: #161b22; color: #8b949e;
    }
    .session-tab:hover { border-color: #58a6ff; color: #e6edf3; }
    .session-tab.active { background: #21262d; border-color: #58a6ff; color: #e6edf3; }
    .session-tab .user-count {
      font-size: 10px; background: #30363d; padding: 1px 5px; border-radius: 8px; margin-left: 4px;
    }
    #new-session-btn {
      padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
      border: 1px dashed #30363d; background: transparent; color: #7ee787; white-space: nowrap;
    }
    #new-session-btn:hover { border-color: #7ee787; background: #161b22; }
    #terminal-container { flex: 1; min-height: 0; padding: 4px; }
    #bottom-panel {
      flex-shrink: 0; border-top: 1px solid #30363d; display: flex;
      flex-direction: column; max-height: 220px;
    }
    #bottom-panel.collapsed #chat-log,
    #bottom-panel.collapsed #key-bar { display: none; }
    #chat-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: #161b22; cursor: pointer;
      font-size: 12px; color: #8b949e; user-select: none;
    }
    #chat-toggle:hover { color: #e6edf3; }
    #chat-toggle .toggle-label { display: flex; align-items: center; gap: 6px; }
    #chat-toggle .toggle-arrow { font-size: 10px; transition: transform 0.15s; }
    #bottom-panel.collapsed #chat-toggle .toggle-arrow { transform: rotate(180deg); }
    #chat-badge {
      background: #da3633; color: white; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 8px; display: none;
    }
    #chat-log {
      flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 13px;
      min-height: 80px; max-height: 150px;
    }
    #chat-log::-webkit-scrollbar { width: 6px; }
    #chat-log::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .chat-msg { margin: 3px 0; line-height: 1.4; }
    .chat-msg .name { font-weight: 600; }
    .chat-msg .text { color: #c9d1d9; }
    .chat-msg.system { color: #8b949e; font-style: italic; font-size: 12px; }
    #input-area {
      display: flex; align-items: center; padding: 8px 12px; gap: 8px;
      background: #161b22; border-top: 1px solid #30363d;
    }
    #input-area .name-tag {
      font-size: 13px; font-weight: 600; white-space: nowrap; padding: 6px 10px;
      background: #21262d; border-radius: 6px; border: 1px solid #30363d;
      cursor: pointer; user-select: none;
    }
    #input-area .name-tag:hover { border-color: #58a6ff; }
    #name-edit-input {
      background: #0d1117; border: 1px solid #58a6ff; color: #e6edf3;
      padding: 5px 8px; border-radius: 6px; font-size: 13px; font-weight: 600;
      width: 100px; outline: none;
    }
    #msg-input {
      flex: 1; background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #58a6ff; }
    #msg-input:disabled { opacity: 0.5; }
    #send-btn {
      background: #238636; color: white; border: none; padding: 8px 20px;
      border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500;
      white-space: nowrap;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
    #key-bar {
      display: flex; gap: 4px; padding: 6px 12px; background: #161b22;
      border-top: 1px solid #30363d; flex-wrap: wrap;
    }
    .key-btn {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .key-btn:hover { background: #30363d; }
    .key-btn:active { background: #484f58; }
    #name-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #161b22; padding: 32px; border-radius: 12px;
      border: 1px solid #30363d; text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .modal-box h2 { margin-bottom: 6px; font-size: 20px; }
    .modal-box p { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
    .modal-box input {
      background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
      padding: 10px 14px; border-radius: 6px; font-size: 16px; width: 220px;
      outline: none; text-align: center;
    }
    .modal-box input:focus { border-color: #58a6ff; }
    .modal-box button {
      background: #238636; color: white; border: none; padding: 10px 24px;
      border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 500; margin-left: 8px;
    }
    .modal-box button:hover { background: #2ea043; }
    #lobby-view {
      display: none; flex: 1; align-items: center; justify-content: center;
      color: #8b949e; font-size: 14px;
    }
    body.in-lobby #lobby-view { display: flex; }
    body.in-lobby #terminal-container, body.in-lobby #bottom-panel { display: none; }
  </style>
</head>
<body class="in-lobby">
  <div id="name-modal">
    <div class="modal-box">
      <h2>Claude Collab</h2>
      <p>Enter your name to join</p>
      <div>
        <input id="name-input" type="text" placeholder="your name" maxlength="20" autofocus>
        <button id="join-btn">Join</button>
      </div>
    </div>
  </div>
  <div id="header">
    <h1>Claude <span>Collab</span></h1>
    <div id="users-bar"></div>
  </div>
  <div id="session-bar">
    <button id="new-session-btn">+ New Session</button>
  </div>
  <div id="lobby-view">Select a session above or create a new one</div>
  <div id="terminal-container"></div>
  <div id="bottom-panel" class="collapsed">
    <div id="chat-toggle">
      <span class="toggle-label"><span class="toggle-arrow">&#9660;</span> Chat</span>
      <span id="chat-badge">0</span>
    </div>
    <div id="key-bar">
      <button class="key-btn" data-label="Enter">Enter</button>
      <button class="key-btn" data-label="Esc">Esc</button>
      <button class="key-btn" data-label="Tab">Tab</button>
      <button class="key-btn" data-label="Space">Space</button>
      <button class="key-btn" data-label="Up">Up</button>
      <button class="key-btn" data-label="Down">Down</button>
      <button class="key-btn" data-label="Left">Left</button>
      <button class="key-btn" data-label="Right">Right</button>
      <button class="key-btn" data-label="Ctrl+C">Ctrl+C</button>
      <button class="key-btn" data-label="y">y</button>
      <button class="key-btn" data-label="n">n</button>
    </div>
    <div id="chat-log"></div>
    <div id="input-area">
      <div class="name-tag" id="my-name-tag" style="display:none"></div>
      <input id="msg-input" type="text" placeholder="Type a message to Claude..." disabled>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true, fontSize: 14,
      fontFamily: '"JetBrains Mono", Menlo, Monaco, "Courier New", monospace',
      theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff', selectionBackground: '#264f78' },
      disableStdin: true, scrollback: 5000,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();
    // Simple scroll tracking - removed overcomplicated version
    window.addEventListener('resize', () => fitAddon.fit());
    new ResizeObserver(() => fitAddon.fit()).observe(document.getElementById('terminal-container'));

    let ws, myName = '', currentSessionId = null, sessionList = [], pendingJoin = null;
    let scrollTimer = null;
    function smartScroll() {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => term.scrollToBottom(), 50);
    }

    const COLORS = ['#ff7b72','#d2a8ff','#79c0ff','#7ee787','#ffa657','#f778ba','#a5d6ff','#ffd8b1'];
    function nameColor(n) { let h=0; for(let i=0;i<n.length;i++) h=n.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }
    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function formatSessionTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / 86400000);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const timeStr = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (diffDays === 0) {
        // Today - show relative if recent, otherwise time
        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin < 1) return 'just now';
        if (diffMin < 60) return diffMin + 'm ago';
        return 'Today, ' + timeStr;
      }
      if (diffDays === 1) return 'Yesterday, ' + timeStr;
      if (diffDays < 7) return d.toLocaleDateString([], { weekday: 'short' }) + ', ' + timeStr;
      if (d.getFullYear() === now.getFullYear()) return months[d.getMonth()] + ' ' + d.getDate() + ', ' + timeStr;
      return months[d.getMonth()] + ' ' + d.getDate() + ' ' + d.getFullYear() + ', ' + timeStr;
    }

    function addChat(name, text) {
      const log = document.getElementById('chat-log'), div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = `<span class="name" style="color:${nameColor(name)}">${esc(name)}</span>: <span class="text">${esc(text)}</span>`;
      log.appendChild(div); log.scrollTop = log.scrollHeight;
      if (typeof bumpChatBadge === 'function') bumpChatBadge();
    }
    function addSystem(text) {
      const log = document.getElementById('chat-log'), div = document.createElement('div');
      div.className = 'chat-msg system'; div.textContent = text;
      log.appendChild(div); log.scrollTop = log.scrollHeight;
      if (typeof bumpChatBadge === 'function') bumpChatBadge();
    }
    function updateUsers(users) {
      document.getElementById('users-bar').innerHTML = users.map(u =>
        `<span class="user-dot"></span><span style="color:${nameColor(u)}">${esc(u)}</span>`
      ).join('&nbsp;&nbsp;');
    }
    function renderSessionTabs() {
      const bar = document.getElementById('session-bar');
      bar.querySelectorAll('.session-tab').forEach(t => t.remove());
      const btn = document.getElementById('new-session-btn');
      sessionList.forEach(s => {
        const tab = document.createElement('div');
        tab.className = 'session-tab' + (s.id === currentSessionId ? ' active' : '');
        tab.dataset.id = s.id;
        tab.innerHTML = `<span class="tab-name">${esc(s.name)}</span><span class="user-count">${s.users.length}</span>`;
        tab.addEventListener('click', () => joinSession(s.id));
        tab.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          const nameSpan = tab.querySelector('.tab-name');
          const input = document.createElement('input');
          input.value = s.name;
          input.style.cssText = 'background:#0d1117;border:1px solid #58a6ff;color:#e6edf3;padding:2px 6px;border-radius:4px;font-size:12px;width:100px;outline:none;';
          nameSpan.replaceWith(input);
          input.focus(); input.select();
          let saved = false;
          function save() {
            if (saved) return; saved = true;
            const newName = input.value.trim() || s.name;
            fetch('/api/sessions', {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: s.id, name: newName }),
            });
            s.name = newName;
            const span = document.createElement('span');
            span.className = 'tab-name'; span.textContent = newName;
            input.replaceWith(span);
          }
          input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); save(); } if (e.key === 'Escape') save(); });
          input.addEventListener('blur', save);
        });
        bar.insertBefore(tab, btn);
      });
    }
    function joinSession(sessionId) {
      if (currentSessionId === sessionId) return;
      currentSessionId = sessionId;
      term.clear(); term.reset();
      document.getElementById('chat-log').innerHTML = '';
      document.body.classList.remove('in-lobby');
      ws.send(JSON.stringify({ type: 'join-session', sessionId, name: myName }));
      const url = new URL(location.href); url.searchParams.set('s', sessionId);
      history.replaceState(null, '', url);
      renderSessionTabs();
      document.getElementById('msg-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('msg-input').focus();
      setTimeout(() => fitAddon.fit(), 50);
    }
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen = () => {
        const urlSession = new URL(location.href).searchParams.get('s');
        if (urlSession) pendingJoin = urlSession;
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case 'sessions':
            sessionList = msg.sessions; renderSessionTabs();
            if (pendingJoin) {
              if (sessionList.find(s => s.id === pendingJoin)) joinSession(pendingJoin);
              pendingJoin = null;
            }
            break;
          case 'output': term.write(msg.data); smartScroll(); break;
          case 'chat': addChat(msg.name, msg.text); break;
          case 'system': addSystem(msg.text); break;
          case 'users':
            updateUsers(msg.users);
            if (currentSessionId) {
              const s = sessionList.find(s => s.id === currentSessionId);
              if (s) s.users = msg.users;
              renderSessionTabs();
            }
            break;
        }
      };
      ws.onclose = () => {
        document.getElementById('msg-input').disabled = true;
        document.getElementById('send-btn').disabled = true;
        addSystem('Disconnected. Reconnecting...');
        setTimeout(connect, 2000);
      };
      ws.onerror = () => ws.close();
    }
    function send() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN || !currentSessionId) return;
      ws.send(JSON.stringify({ type: 'input', text }));
      input.value = ''; input.focus();
    }
    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    document.getElementById('msg-input').addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (!item.type.startsWith('image/')) continue;
        e.preventDefault();
        const blob = item.getAsFile();
        if (!blob) continue;
        const input = document.getElementById('msg-input');
        const origPlaceholder = input.placeholder;
        input.placeholder = 'Uploading image...';
        input.style.borderColor = '#ffa657';
        try {
          const fd = new FormData();
          fd.append('image', blob);
          const res = await fetch('/api/upload-image', { method: 'POST', body: fd });
          const data = await res.json();
          if (data.path) {
            input.value = (input.value ? input.value + ' ' : '') + data.path;
            input.focus();
          } else {
            addSystem('Image upload failed: ' + (data.error || 'unknown error'));
          }
        } catch (err) {
          addSystem('Image upload failed: ' + err.message);
        } finally {
          input.placeholder = origPlaceholder;
          input.style.borderColor = '';
        }
        break; // only handle first image
      }
    });
    document.getElementById('send-btn').addEventListener('click', send);
    const KEY_MAP = {
      'Enter':'\r','Esc':'\x1b','Tab':'\t','Space':' ',
      'Up':'\x1b[A','Down':'\x1b[B','Left':'\x1b[D','Right':'\x1b[C',
      'Ctrl+C':'\x03','y':'y','n':'n',
    };
    document.getElementById('key-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.key-btn');
      if (!btn || !ws || ws.readyState !== WebSocket.OPEN) return;
      const seq = KEY_MAP[btn.dataset.label];
      if (seq) ws.send(JSON.stringify({ type: 'key', seq, label: btn.dataset.label }));
    });
    // Chat panel toggle
    let chatUnread = 0;
    const chatPanel = document.getElementById('bottom-panel');
    const chatBadge = document.getElementById('chat-badge');
    document.getElementById('chat-toggle').addEventListener('click', () => {
      chatPanel.classList.toggle('collapsed');
      if (!chatPanel.classList.contains('collapsed')) {
        chatUnread = 0; chatBadge.style.display = 'none';
        document.getElementById('msg-input').focus();
        setTimeout(() => fitAddon.fit(), 50);
      } else {
        setTimeout(() => fitAddon.fit(), 50);
      }
    });
    function bumpChatBadge() {
      if (!chatPanel.classList.contains('collapsed')) return;
      chatUnread++; chatBadge.textContent = chatUnread > 99 ? '99+' : chatUnread;
      chatBadge.style.display = 'inline';
    }

    document.getElementById('new-session-btn').addEventListener('click', async (e) => {
      // Show a dropdown: New / Resume from disk
      const existing = document.getElementById('new-session-menu');
      if (existing) { existing.remove(); return; }

      const menu = document.createElement('div');
      menu.id = 'new-session-menu';
      const btnRect = e.currentTarget.getBoundingClientRect();
      menu.style.cssText = `position:fixed;top:${btnRect.bottom + 4}px;left:${btnRect.left}px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 0;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4);min-width:340px;max-height:400px;overflow-y:auto;`;

      // New session option
      const newOpt = document.createElement('div');
      newOpt.textContent = '+ New blank session';
      newOpt.style.cssText = 'padding:8px 16px;cursor:pointer;font-size:13px;color:#7ee787;';
      newOpt.onmouseenter = () => newOpt.style.background = '#21262d';
      newOpt.onmouseleave = () => newOpt.style.background = '';
      newOpt.onclick = async () => {
        menu.remove();
        const name = prompt('Session name:');
        if (!name) return;
        const res = await fetch('/api/sessions', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const session = await res.json();
        joinSession(session.id);
      };
      menu.appendChild(newOpt);

      // Divider
      const divider = document.createElement('div');
      divider.style.cssText = 'border-top:1px solid #30363d;margin:4px 0;';
      menu.appendChild(divider);

      // Loading
      const loading = document.createElement('div');
      loading.textContent = 'Loading sessions from disk...';
      loading.style.cssText = 'padding:8px 16px;font-size:12px;color:#8b949e;';
      menu.appendChild(loading);

      document.body.appendChild(menu);

      // Fetch disk sessions
      const res = await fetch('/api/disk-sessions');
      const diskSessions = await res.json();
      loading.remove();

      if (diskSessions.length === 0) {
        const empty = document.createElement('div');
        empty.textContent = 'No sessions found on disk';
        empty.style.cssText = 'padding:8px 16px;font-size:12px;color:#8b949e;';
        menu.appendChild(empty);
      } else {
        // Header
        const header = document.createElement('div');
        header.textContent = 'Resume from disk:';
        header.style.cssText = 'padding:4px 16px 4px;font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;';
        menu.appendChild(header);

        diskSessions.forEach(ds => {
          const opt = document.createElement('div');
          opt.style.cssText = 'padding:6px 16px;cursor:pointer;font-size:13px;';
          const timeStr = formatSessionTime(ds.lastModified || ds.timestamp);
          opt.innerHTML = `<div style="color:#e6edf3;margin-bottom:2px">${esc(ds.firstMessage)}</div><div style="font-size:11px;color:#8b949e">${esc(ds.project)} &middot; ${ds.claudeSessionId.slice(0,8)}${timeStr ? ` &middot; <span style="color:#79c0ff">${esc(timeStr)}</span>` : ''}</div>`;
          opt.onmouseenter = () => opt.style.background = '#21262d';
          opt.onmouseleave = () => opt.style.background = '';
          opt.onclick = async () => {
            menu.remove();
            const name = ds.firstMessage.slice(0, 30) || ds.claudeSessionId.slice(0, 8);
            const r = await fetch('/api/sessions', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, resumeId: ds.claudeSessionId }),
            });
            const session = await r.json();
            joinSession(session.id);
          };
          menu.appendChild(opt);
        });
      }

      // Close on click outside
      const closeMenu = (ev) => {
        if (!menu.contains(ev.target) && ev.target !== e.target) {
          menu.remove();
          document.removeEventListener('click', closeMenu);
        }
      };
      setTimeout(() => document.addEventListener('click', closeMenu), 0);
    });
    function joinFlow() {
      const name = document.getElementById('name-input').value.trim();
      if (!name) return;
      myName = name;
      localStorage.setItem('claude-collab-name', name);
      document.getElementById('name-modal').style.display = 'none';
      document.getElementById('my-name-tag').textContent = name;
      document.getElementById('my-name-tag').style.display = 'block';
      document.getElementById('my-name-tag').style.color = nameColor(name);
      connect();
    }
    document.getElementById('input-area').addEventListener('click', (e) => {
      const tag = e.target.closest('#my-name-tag');
      if (!tag) return;
      const input = document.createElement('input');
      input.id = 'name-edit-input'; input.value = myName; input.maxLength = 20;
      tag.replaceWith(input); input.focus(); input.select();
      let saved = false;
      function save() {
        if (saved) return; saved = true;
        const newName = input.value.trim() || myName;
        myName = newName;
        localStorage.setItem('claude-collab-name', newName);
        const t = document.createElement('div');
        t.className = 'name-tag'; t.id = 'my-name-tag';
        t.textContent = newName; t.style.display = 'block'; t.style.color = nameColor(newName);
        input.replaceWith(t);
        if (ws && ws.readyState === WebSocket.OPEN && currentSessionId)
          ws.send(JSON.stringify({ type: 'join-session', sessionId: currentSessionId, name: newName }));
      }
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); save(); } });
      input.addEventListener('blur', save);
    });
    const savedName = localStorage.getItem('claude-collab-name');
    if (savedName) { document.getElementById('name-input').value = savedName; joinFlow(); }
    document.getElementById('name-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') joinFlow(); });
    document.getElementById('join-btn').addEventListener('click', joinFlow);
  </script>
</body>
</html>
